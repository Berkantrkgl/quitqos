<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512" fill="none">
  <!-- SPLASH mark — transparent; Expo composites it over backgroundColor (#FBFDFC).
       Just the mark, centered, with a little breathing room. Wordmark is NOT baked
       in (Expo's native splash centers a single image; a baked wordmark drifts on
       odd aspect ratios). The RN app can render the wordmark itself after mount. -->
  <g transform="translate(96 96) scale(3.2)">
    <circle cx="50" cy="50" r="30" stroke="#86978F" stroke-width="5"/>
    <path d="M50 20 A30 30 0 0 1 76.5 34.5" stroke="#0E9E77" stroke-width="5" stroke-linecap="round"/>
    <circle cx="76.5" cy="34.5" r="5" fill="#C77A0A"/>
    <circle cx="50" cy="50" r="13.5" stroke="#0E9E77" stroke-width="8"/>
    <path d="M59.5 59.5 L69 69" stroke="#0E9E77" stroke-width="8" stroke-linecap="round"/>
  </g>
</svg>
