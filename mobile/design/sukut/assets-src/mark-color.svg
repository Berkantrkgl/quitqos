<svg xmlns="http://www.w3.org/2000/svg" width="100" height="100" viewBox="0 0 100 100" fill="none">
  <!-- QuitQOS "Orbit Q" (N2) — canonical COLOR mark. Transparent background.
       Inner Q = the person; outer orbit = elapsed time; amber dot = the now.
       This is the single source of truth; every asset derives from it. -->
  <!-- outer orbit ring (neutral track) -->
  <circle cx="50" cy="50" r="30" stroke="#86978F" stroke-width="5"/>
  <!-- traveled arc (teal) from top clockwise to the dot -->
  <path d="M50 20 A30 30 0 0 1 76.5 34.5" stroke="#0E9E77" stroke-width="5" stroke-linecap="round"/>
  <!-- traveling dot = the now, on the orbit (amber) -->
  <circle cx="76.5" cy="34.5" r="5" fill="#C77A0A"/>
  <!-- inner Q core -->
  <circle cx="50" cy="50" r="13.5" stroke="#0E9E77" stroke-width="8"/>
  <!-- Q tail — kept short so it doesn't touch the outer orbit ring -->
  <path d="M59.5 59.5 L69 69" stroke="#0E9E77" stroke-width="8" stroke-linecap="round"/>
</svg>
