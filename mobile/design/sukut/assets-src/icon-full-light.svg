<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024" fill="none">
  <!-- QuitQOS app icon — "Twin Rings", light teal-tint full-bleed 1024. iOS/general
       icon.png. Light ground (#E4F5EF); the OS applies its own mask/rounding.
       Geometry mirrors mark-color.svg exactly, scaled 6.2 and centred. The teal
       gradient runs a touch darker than the in-app mark so it reads with contrast
       on the light tile. -->
  <defs>
    <linearGradient id="teal" gradientUnits="userSpaceOnUse" x1="388" y1="363" x2="611" y2="673">
      <stop offset="0" stop-color="#2FB58C"/>
      <stop offset="0.55" stop-color="#128E6B"/>
      <stop offset="1" stop-color="#0A6E52"/>
    </linearGradient>
    <linearGradient id="amber" gradientUnits="userSpaceOnUse" x1="661" y1="580" x2="748" y2="679">
      <stop offset="0" stop-color="#F5A623"/>
      <stop offset="1" stop-color="#D9770A"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#F5A623" stop-opacity="0.42"/>
      <stop offset="0.5" stop-color="#F5A623" stop-opacity="0.16"/>
      <stop offset="1" stop-color="#F5A623" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1024" height="1024" fill="#E4F5EF"/>

  <g transform="translate(202 202) scale(6.2)">
    <g transform="translate(0 0.6)" opacity="0.16">
      <circle cx="37" cy="50" r="20" stroke="#0A3D2E" stroke-width="9" fill="none"/>
      <circle cx="63" cy="50" r="20" stroke="#0A3D2E" stroke-width="9" fill="none"/>
    </g>
    <circle cx="63" cy="50" r="20" stroke="url(#teal)" stroke-width="9" fill="none"/>
    <!-- amber tail: a soft radial glow halo (no filter → no bounding-box artefact),
         then the crisp gradient stroke on top -->
    <circle cx="80.5" cy="68" r="20" fill="url(#glow)"/>
    <path d="M74.5 62 L86 73.5" stroke="url(#amber)" stroke-width="9" stroke-linecap="round" fill="none"/>
    <circle cx="37" cy="50" r="20" stroke="url(#teal)" stroke-width="9" fill="none"/>
  </g>
</svg>
