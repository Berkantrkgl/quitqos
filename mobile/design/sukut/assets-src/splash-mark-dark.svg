<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512" fill="none">
  <!-- SPLASH mark — DARK variant. Expo composites it over the dark splash
       backgroundColor (#0C1210). Uses the app's dark-theme teal (brighter) so
       the mark reads on the dark ground. Geometry mirrors mark-color.svg, 3.2. -->
  <defs>
    <linearGradient id="teal" gradientUnits="userSpaceOnUse" x1="192" y1="179" x2="307" y2="339">
      <stop offset="0" stop-color="#6BF0C6"/>
      <stop offset="0.55" stop-color="#34E3AD"/>
      <stop offset="1" stop-color="#1FB98A"/>
    </linearGradient>
    <linearGradient id="amber" gradientUnits="userSpaceOnUse" x1="333" y1="291" x2="378" y2="342">
      <stop offset="0" stop-color="#FFD37A"/>
      <stop offset="1" stop-color="#F0A020"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#F0B429" stop-opacity="0.5"/>
      <stop offset="0.5" stop-color="#F0B429" stop-opacity="0.2"/>
      <stop offset="1" stop-color="#F0B429" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <g transform="translate(96 96) scale(3.2)">
    <circle cx="63" cy="50" r="20" stroke="url(#teal)" stroke-width="9" fill="none"/>
    <circle cx="80.5" cy="68" r="19" fill="url(#glow)"/>
    <path d="M74.5 62 L86 73.5" stroke="url(#amber)" stroke-width="9" stroke-linecap="round" fill="none"/>
    <circle cx="37" cy="50" r="20" stroke="url(#teal)" stroke-width="9" fill="none"/>
  </g>
</svg>
