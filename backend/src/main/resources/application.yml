spring:
  application:
    name: quitqos-backend

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5434/quitqos}
    username: ${DB_USERNAME:quitqos}
    password: ${DB_PASSWORD:quitqos}
    hikari:
      # Shared Aiven instance has a 15-connection limit split across several apps
      # (PaceUp + QuitQOS + future ones). QuitQOS is low-traffic, so cap its pool
      # small to leave slots for the others. Override with DB_POOL_SIZE if needed.
      maximum-pool-size: ${DB_POOL_SIZE:3}

  jpa:
    hibernate:
      # Flyway owns the schema; Hibernate only validates entities against it.
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC

  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: ${SERVER_PORT:8080}

# Application-specific config (consumed by stage 2+ via @ConfigurationProperties / @Value).
quitqos:
  jwt:
    # Base64-encoded HMAC secret. Override in every real environment.
    secret: ${JWT_SECRET:ZGV2LW9ubHktc2VjcmV0LWNoYW5nZS1tZS1pbi1wcm9kdWN0aW9uLTEyMzQ1Ng==}
    access-token-ttl: ${JWT_ACCESS_TTL:PT1H}        # ISO-8601 duration (~1 hour)
    refresh-token-ttl: ${JWT_REFRESH_TTL:P180D}     # ~180 days
  firebase:
    # Firebase service-account JSON (gitignored), lives in src/main/resources so it's on the
    # classpath. Resolved via ResourceLoader → works from any working dir (IDE Run or terminal).
    # Override with FIREBASE_CREDENTIALS (accepts classpath:/file:/plain paths). Auth fails fast if blank.
    credentials-path: ${FIREBASE_CREDENTIALS:classpath:firebase-service-account.json}
  notifications:
    # How often the milestone scheduler scans ACTIVE attempts (ms). API design §10: "örn. her dakika".
    scheduler-rate-ms: ${NOTIFICATIONS_SCHEDULER_RATE_MS:60000}

logging:
  level:
    org.flywaydb: info
